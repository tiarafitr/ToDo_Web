<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List 💖</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffe4ec, #ffd6e0);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 135, 0.2);
        }

        h1 {
            text-align: center;
            color: #ff4d88;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"], input[type="date"] {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ffc2d1;
        }

        button {
            background: #ff4d88;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #e6005c;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #fff0f5;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .task-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .done {
            text-decoration: line-through;
            color: gray;
        }

        .deadline {
            font-size: 12px;
            color: #888;
        }

        .overdue {
            color: red;
            font-weight: bold;
        }

        .actions a {
            margin-left: 10px;
            text-decoration: none;
            color: #ff4d88;
            font-size: 14px;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>💖 My To-Do List</h1>

    <!-- FORM -->
    <form action="/add" method="post">
        <input name="title" placeholder="What do you need to do?" required>
        <input type="date" name="deadline">
        <button type="submit">Add</button>
    </form>

    <!-- LIST -->
    <ul>
        {% for task in tasks %}
        <li>
            <div class="task-left">
                <input type="checkbox"
                       onclick="window.location.href='/done/{{ loop.index0 }}'"
                       {% if task.done %}checked{% endif %}>

                <div>
                    <div class="{% if task.done %}done{% endif %}">
                        {{ task.title }}
                    </div>

                    {% if task.deadline %}
                        <div class="deadline">
                            ⏰ {{ task.deadline }}
                        </div>
                    {% endif %}
                </div>
            </div>

            <div class="actions">
                <a href="/delete/{{ loop.index0 }}">🗑</a>
            </div>
        </li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
